<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฉลาดใช้ — Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1f1f1f;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0f0f0;--muted:#666;--muted2:#444;
  --green:#00e676;--green2:#00c853;--green-dim:rgba(0,230,118,.1);
  --red:#ff5252;--red-dim:rgba(255,82,82,.1);
  --blue:#448aff;--blue-dim:rgba(68,138,255,.1);
  --r:10px;--r2:16px;
}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100%;overflow-x:hidden;font-size:14px}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{padding:24px 20px;font-size:16px;font-weight:600;border-bottom:1px solid var(--border)}
.logo em{color:var(--green);font-style:normal}
.nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--muted);font-size:13px;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--green);background:var(--green-dim)}
.ni{width:16px;height:16px;opacity:.7;flex-shrink:0}
.nav-item.active .ni{opacity:1}
.sb-foot{padding:12px 10px;border-top:1px solid var(--border)}
.bud{background:var(--bg3);border-radius:var(--r);padding:12px;border:1px solid var(--border)}
.bud-lbl{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.bud-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px}
.bud-trk{height:3px;background:var(--bg4);border-radius:2px}
.bud-fill{height:3px;border-radius:2px;background:var(--green);transition:width .6s ease;width:0%}

/* MAIN */
.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.page-title{font-size:15px;font-weight:500}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-family:inherit;cursor:pointer;transition:.15s;border:1px solid var(--border2);background:var(--bg3);color:var(--muted)}
.btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-primary{background:var(--green);border-color:var(--green);color:#000;font-weight:600}
.btn-primary:hover{background:var(--green2)}
.content{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;transition:.2s}
.stat:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stat-lbl{font-size:11px;color:var(--muted);letter-spacing:.04em}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;font-family:'IBM Plex Mono',monospace}
.bg{background:var(--green-dim);color:var(--green)}
.br{background:var(--red-dim);color:var(--red)}
.bb{background:var(--blue-dim);color:var(--blue)}
.stat-val{font-size:22px;font-weight:600;margin-bottom:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:-1px}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.w{color:var(--text)}
.stat-sub{font-size:11px;color:var(--muted)}

/* GRID */
.mid-row{display:grid;grid-template-columns:1fr 300px;gap:16px}
.col-l{display:flex;flex-direction:column;gap:16px}
.col-r{display:flex;flex-direction:column;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.card-head{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:500}
.card-act{font-size:11px;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;transition:.15s}
.card-act:hover{color:var(--green)}
.card-body{padding:14px 16px}

/* CHART */
.ctabs{display:flex;gap:4px;margin-bottom:14px}
.ctab{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);font-family:inherit;transition:.15s}
.ctab.active{background:var(--green-dim);border-color:rgba(0,230,118,.25);color:var(--green)}
.bars{display:flex;align-items:flex-end;gap:4px;height:120px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bgrp{display:flex;align-items:flex-end;gap:1.5px;width:100%}
.bbar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s ease}
.blbl{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.legend{display:flex;gap:12px;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:2px}

/* TABLE */
.tx-tbl{width:100%;border-collapse:collapse}
.tx-tbl th{font-size:10px;color:var(--muted);font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);letter-spacing:.05em;text-transform:uppercase}
.tx-tbl td{padding:8px 8px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
.tx-tbl tr:last-child td{border-bottom:none}
.tx-tbl tr:hover td{background:rgba(255,255,255,.015)}
.tx-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.tx-name{font-size:13px;font-weight:500}
.tx-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--muted)}
.tx-date{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.tx-amt{font-size:13px;font-weight:600;text-align:right;font-family:'IBM Plex Mono',monospace}
.pos{color:var(--green)}.neg{color:var(--red)}.inv{color:var(--blue)}

/* CATS */
.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-row{display:flex;align-items:center;gap:8px}
.cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cat-name{flex:1;font-size:12px}
.cat-trk{flex:2;background:var(--bg4);border-radius:2px;height:3px}
.cat-fill{height:3px;border-radius:2px}
.cat-pct{font-size:11px;color:var(--muted);width:28px;text-align:right;font-family:'IBM Plex Mono',monospace}

/* INV */
.inv-list{display:flex;flex-direction:column;gap:8px}
.inv-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.inv-name{font-size:12px;font-weight:600}
.inv-type{font-size:10px;color:var(--muted);margin-top:1px}
.inv-trk{background:var(--bg4);border-radius:2px;height:3px;margin-bottom:5px}
.inv-fill{height:3px;border-radius:2px}
.inv-ft{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.chg-up{background:var(--green-dim);color:var(--green);font-size:10px;padding:2px 6px;border-radius:4px;font-family:'IBM Plex Mono',monospace}

/* EMPTY / LOADING */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;color:var(--muted);gap:8px}
.empty-ico{font-size:26px;opacity:.4}
.empty-txt{font-size:12px}
.load-row{display:flex;gap:8px;align-items:center;padding:12px 0;color:var(--muted);font-size:12px}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:24px;width:400px;max-width:94vw;transform:translateY(10px) scale(.98);transition:transform .2s}
.overlay.show .modal{transform:none}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:18px}
.tbtn{padding:8px;text-align:center;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--muted);transition:.15s;background:none;font-family:inherit}
.tbtn:hover{border-color:var(--border2);color:var(--text)}
.tbtn.si{background:var(--green-dim);border-color:rgba(0,230,118,.3);color:var(--green)}
.tbtn.se{background:var(--red-dim);border-color:rgba(255,82,82,.3);color:var(--red)}
.tbtn.sv{background:var(--blue-dim);border-color:rgba(68,138,255,.3);color:var(--blue)}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.04em}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:.15s}
.field input:focus,.field select:focus{border-color:rgba(0,230,118,.4)}
.field input::placeholder{color:var(--muted2)}
.field select option{background:var(--bg2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;margin-top:6px}
.mbtn{flex:1;padding:11px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.mbtn-c{background:none;border:1px solid var(--border);color:var(--muted)}
.mbtn-c:hover{border-color:var(--border2);color:var(--text)}
.mbtn-s{background:var(--green);border:none;color:#000}
.mbtn-s:hover{background:var(--green2)}
.mbtn-s:disabled{opacity:.5;cursor:default}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;z-index:600;transform:translateY(8px);opacity:0;transition:.3s;pointer-events:none}
.toast.show{transform:none;opacity:1}
.toast.ok{border-color:rgba(0,230,118,.35);color:var(--green)}
.toast.err{border-color:rgba(255,82,82,.35);color:var(--red)}
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="logo">ฉลาด<em>ใช้</em></div>
  <nav class="nav">
    <button class="nav-item active" onclick="setPage('dashboard',this)">
      <svg class="ni" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      ภาพรวม
    </button>
    <button class="nav-item" onclick="setPage('expense',this)">
      <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v7M5.5 6.5C5.5 5.4 6.6 4.5 8 4.5s2.5.9 2.5 2c0 2.5-5 2.5-5 5 0 1.1 1.1 2 2.5 2s2.5-.9 2.5-2"/></svg>
      รายรับ-รายจ่าย
    </button>
    <button class="nav-item" onclick="setPage('invest',this)">
      <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,11 5,7 8,9 15,3"/><polyline points="11,3 15,3 15,7"/></svg>
      การลงทุน
    </button>
    <button class="nav-item" onclick="setPage('tax',this)">
      <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1.5" width="12" height="13" rx="1.5"/><path d="M5 5.5h6M5 8h6M5 10.5h4"/></svg>
      คำนวณภาษี
    </button>
  </nav>
  <div class="sb-foot">
    <div class="bud">
      <div class="bud-lbl">budget เดือนนี้</div>
      <div class="bud-row"><span id="sb-used" style="color:var(--text)">฿0 ใช้ไป</span><span id="sb-left" style="color:var(--green)">฿0 เหลือ</span></div>
      <div class="bud-trk"><div class="bud-fill" id="sb-bar"></div></div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">ภาพรวมการเงิน</div>
    <div class="topbar-right">
      <button class="btn" onclick="refreshAll()" id="refresh-btn">↻ รีเฟรช</button>
      <button class="btn btn-primary" onclick="openModal()">+ บันทึก</button>
    </div>
  </div>

  <div class="content">
    <div class="stat-row">
      <div class="stat"><div class="stat-top"><div class="stat-lbl">รายรับเดือนนี้</div><div class="badge bg" id="b-inc">—</div></div><div class="stat-val g" id="v-inc">฿0</div><div class="stat-sub" id="s-inc">—</div></div>
      <div class="stat"><div class="stat-top"><div class="stat-lbl">รายจ่ายเดือนนี้</div><div class="badge br" id="b-exp">—</div></div><div class="stat-val r" id="v-exp">฿0</div><div class="stat-sub" id="s-exp">—</div></div>
      <div class="stat"><div class="stat-top"><div class="stat-lbl">ลงทุนเดือนนี้</div><div class="badge bb">DCA</div></div><div class="stat-val b" id="v-inv">฿0</div><div class="stat-sub" id="s-inv">—</div></div>
      <div class="stat"><div class="stat-top"><div class="stat-lbl">เงินคงเหลือ</div><div class="badge bg" id="b-bal">—</div></div><div class="stat-val w" id="v-bal">฿0</div><div class="stat-sub" id="s-bal">—</div></div>
    </div>

    <div class="mid-row">
      <div class="col-l">
        <div class="card">
          <div class="card-head">
            <div class="card-title">รายรับ vs รายจ่าย</div>
            <div style="display:flex;gap:4px">
              <button class="ctab active" onclick="switchChart('6M',this)">6 เดือน</button>
              <button class="ctab" onclick="switchChart('1Y',this)">1 ปี</button>
            </div>
          </div>
          <div class="card-body">
            <div class="bars" id="bar-chart"><div class="load-row"><div class="spin"></div>กำลังโหลด...</div></div>
            <div class="legend">
              <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>รายรับ</div>
              <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>รายจ่าย</div>
              <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>ลงทุน</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <div class="card-title">รายการล่าสุด</div>
            <button class="card-act" onclick="refreshAll()">รีเฟรช ↻</button>
          </div>
          <div class="card-body" style="padding:0 8px">
            <table class="tx-tbl">
              <thead><tr><th></th><th>รายการ</th><th>หมวด</th><th>วันที่</th><th style="text-align:right">จำนวน</th></tr></thead>
              <tbody id="tx-body"><tr><td colspan="5"><div class="load-row"><div class="spin"></div>กำลังโหลด...</div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-r">
        <div class="card">
          <div class="card-head"><div class="card-title">หมวดรายจ่าย</div><button class="card-act">เดือนนี้</button></div>
          <div class="card-body"><div class="cat-list" id="cat-list"><div class="load-row"><div class="spin"></div></div></div></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">พอร์ตลงทุน</div><button class="card-act">จัดการ →</button></div>
          <div class="card-body"><div class="inv-list" id="inv-list"><div class="load-row"><div class="spin"></div></div></div></div>
        </div>
      </div>
    </div>
  </div>
</main>
</div>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-title">บันทึกรายการใหม่</div>
    <div class="type-toggle">
      <button class="tbtn si" onclick="selType('income',this)">💰 รายรับ</button>
      <button class="tbtn" onclick="selType('expense',this)">💸 รายจ่าย</button>
      <button class="tbtn" onclick="selType('invest',this)">📈 ลงทุน</button>
    </div>
    <div class="field"><label>ชื่อรายการ</label><input type="text" id="f-name" placeholder="เช่น เงินเดือน, ค่าอาหาร..."></div>
    <div class="field-row">
      <div class="field"><label>จำนวนเงิน (฿)</label><input type="number" id="f-amt" placeholder="0" min="0"></div>
      <div class="field"><label>วันที่</label><input type="date" id="f-date"></div>
    </div>
    <div class="field">
      <label>หมวดหมู่</label>
      <select id="f-cat">
        <option value="รายรับ">รายรับ</option>
        <option value="อาหาร">อาหาร</option>
        <option value="เดินทาง">เดินทาง</option>
        <option value="ที่อยู่อาศัย">ที่อยู่อาศัย</option>
        <option value="สุขภาพ">สุขภาพ</option>
        <option value="ความบันเทิง">ความบันเทิง</option>
        <option value="ช้อปปิ้ง">ช้อปปิ้ง</option>
        <option value="การศึกษา">การศึกษา</option>
        <option value="ลงทุน">ลงทุน</option>
        <option value="อื่นๆ">อื่นๆ</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-c" onclick="closeModal()">ยกเลิก</button>
      <button class="mbtn mbtn-s" id="save-btn" onclick="saveTransaction()">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL='https://finance-api-nhsp.onrender.com';
let transactions=[];
let currentType='income';
let chartPeriod='6M';

const fmt=n=>'฿'+Math.abs(n).toLocaleString('th-TH');
const thaiM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const fmtD=d=>{if(!d)return'';const dt=new Date(d);return`${dt.getDate()} ${thaiM[dt.getMonth()]}`};
const typeIco=t=>t==='income'?'💼':t==='invest'?'📈':'💸';
const typeC=t=>t==='income'?'var(--green)':t==='invest'?'var(--blue)':'var(--red)';
const typeDim=t=>t==='income'?'var(--green-dim)':t==='invest'?'var(--blue-dim)':'var(--red-dim)';
const CAT_COLORS=['#448aff','#ff5252','#ffd740','#69f0ae','#ea80fc','#ff6e40'];

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  setTimeout(()=>el.className='toast',2500);
}

async function fetchTx(){
  try{
    const r=await fetch(`${API_URL}/transactions`);
    if(!r.ok)throw new Error();
    transactions=await r.json();
  }catch(e){transactions=[];toast('ไม่สามารถเชื่อมต่อ API','err');}
}

async function postTx(item){
  const r=await fetch(`${API_URL}/transaction`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)});
  if(!r.ok)throw new Error();
  return r.json();
}

function computeStats(){
  const now=new Date();
  const thisM=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const inc=thisM.filter(t=>t.type==='income').reduce((s,t)=>s+Math.abs(t.amt),0);
  const exp=thisM.filter(t=>t.type==='expense').reduce((s,t)=>s+Math.abs(t.amt),0);
  const inv=thisM.filter(t=>t.type==='invest').reduce((s,t)=>s+Math.abs(t.amt),0);
  const bal=inc-exp-inv;
  const nInc=transactions.filter(t=>t.type==='income').length;
  const nExp=transactions.filter(t=>t.type==='expense').length;
  document.getElementById('v-inc').textContent=fmt(inc);
  document.getElementById('v-exp').textContent=fmt(exp);
  document.getElementById('v-inv').textContent=fmt(inv);
  document.getElementById('v-bal').textContent=fmt(bal);
  document.getElementById('b-inc').textContent=nInc+' รายการ';
  document.getElementById('b-exp').textContent=nExp+' รายการ';
  document.getElementById('b-bal').textContent=bal>=0?'บวก':'ติดลบ';
  document.getElementById('s-inc').textContent=`เดือนนี้ ${thisM.filter(t=>t.type==='income').length} รายการ`;
  document.getElementById('s-exp').textContent=`เดือนนี้ ${thisM.filter(t=>t.type==='expense').length} รายการ`;
  document.getElementById('s-inv').textContent=`เดือนนี้ ${thisM.filter(t=>t.type==='invest').length} รายการ`;
  document.getElementById('s-bal').textContent=inc>0?`${Math.round(bal/inc*100)}% ของรายรับ`:'—';
  const budget=50000;const used=exp+inv;
  const pct=Math.min(100,Math.round(used/budget*100));
  document.getElementById('sb-used').textContent=fmt(used)+' ใช้ไป';
  document.getElementById('sb-left').textContent=fmt(Math.max(0,budget-used))+' เหลือ';
  document.getElementById('sb-bar').style.width=pct+'%';
}

function renderTx(){
  const tb=document.getElementById('tx-body');
  const recent=[...transactions].slice(0,10);
  if(!recent.length){tb.innerHTML=`<tr><td colspan="5"><div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">ยังไม่มีรายการ กด + บันทึก เพื่อเริ่ม</div></div></td></tr>`;return;}
  tb.innerHTML=recent.map(t=>{
    const cls=t.type==='income'?'pos':t.type==='invest'?'inv':'neg';
    const sign=t.type==='income'?'+':'-';
    return`<tr>
      <td><div class="tx-ico" style="background:${typeDim(t.type)}">${t.icon||typeIco(t.type)}</div></td>
      <td><div class="tx-name">${t.name}</div></td>
      <td><span class="tx-tag">${t.cat}</span></td>
      <td class="tx-date">${fmtD(t.date)}</td>
      <td class="tx-amt ${cls}">${sign}${fmt(t.amt)}</td>
    </tr>`;
  }).join('');
}

function renderCats(){
  const exp=transactions.filter(t=>t.type==='expense');
  const total=exp.reduce((s,t)=>s+Math.abs(t.amt),0);
  const map={};exp.forEach(t=>{map[t.cat]=(map[t.cat]||0)+Math.abs(t.amt);});
  const cats=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const el=document.getElementById('cat-list');
  if(!cats.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📊</div><div class="empty-txt">ยังไม่มีข้อมูล</div></div>`;return;}
  el.innerHTML=cats.map(([name,amt],i)=>{
    const pct=total>0?Math.round(amt/total*100):0;
    return`<div class="cat-row">
      <div class="cat-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></div>
      <div class="cat-name">${name}</div>
      <div class="cat-trk"><div class="cat-fill" style="width:${pct}%;background:${CAT_COLORS[i%CAT_COLORS.length]}"></div></div>
      <div class="cat-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function renderInv(){
  const inv=transactions.filter(t=>t.type==='invest');
  const el=document.getElementById('inv-list');
  if(!inv.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📈</div><div class="empty-txt">ยังไม่มีรายการลงทุน</div></div>`;return;}
  const total=inv.reduce((s,t)=>s+Math.abs(t.amt),0);
  const grp={};inv.forEach(t=>{grp[t.name]=(grp[t.name]||0)+Math.abs(t.amt);});
  const iColors=['#00e676','#448aff','#ffd740','#ea80fc'];
  el.innerHTML=Object.entries(grp).map(([name,amt],i)=>{
    const pct=Math.round(amt/total*100);
    return`<div class="inv-card">
      <div class="inv-top"><div><div class="inv-name">${name}</div><div class="inv-type">${fmt(amt)} รวม</div></div><span class="chg-up">${pct}%</span></div>
      <div class="inv-trk"><div class="inv-fill" style="width:${pct}%;background:${iColors[i%iColors.length]}"></div></div>
      <div class="inv-ft"><span>${pct}% ของพอร์ต</span><span>${fmt(amt)}</span></div>
    </div>`;
  }).join('');
}

function buildChart(period){
  const bc=document.getElementById('bar-chart');
  const n=period==='6M'?6:12;
  const now=new Date();
  const months=[],inc=[],exp=[],inv=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(d);
    const mt=transactions.filter(t=>{const td=new Date(t.date);return td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear();});
    inc.push(mt.filter(t=>t.type==='income').reduce((s,t)=>s+Math.abs(t.amt),0));
    exp.push(mt.filter(t=>t.type==='expense').reduce((s,t)=>s+Math.abs(t.amt),0));
    inv.push(mt.filter(t=>t.type==='invest').reduce((s,t)=>s+Math.abs(t.amt),0));
  }
  const mx=Math.max(...inc,...exp,...inv,1);
  bc.innerHTML=months.map((d,i)=>{
    const ih=Math.round((inc[i]/mx)*110)+2;
    const eh=Math.round((exp[i]/mx)*110)+2;
    const vh=Math.round((inv[i]/mx)*110)+2;
    const op=i===months.length-1?1:.55;
    return`<div class="bcol">
      <div class="bgrp">
        <div class="bbar" style="height:${ih}px;background:var(--green);opacity:${op}"></div>
        <div class="bbar" style="height:${eh}px;background:var(--red);opacity:${op}"></div>
        <div class="bbar" style="height:${vh}px;background:var(--blue);opacity:${op}"></div>
      </div>
      <div class="blbl">${thaiM[d.getMonth()]}</div>
    </div>`;
  }).join('');
}

function openModal(){
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-name').value='';
  document.getElementById('f-amt').value='';
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('f-name').focus(),200);
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

function selType(type,el){
  currentType=type;
  document.querySelectorAll('.tbtn').forEach(b=>{b.className='tbtn';});
  const cls={income:'si',expense:'se',invest:'sv'};
  el.classList.add(cls[type]);
  const catM={income:'รายรับ',expense:'อาหาร',invest:'ลงทุน'};
  document.getElementById('f-cat').value=catM[type];
}

async function saveTransaction(){
  const name=document.getElementById('f-name').value.trim();
  const amt=parseFloat(document.getElementById('f-amt').value);
  const date=document.getElementById('f-date').value;
  const cat=document.getElementById('f-cat').value;
  if(!name||!amt||!date){toast('กรุณากรอกข้อมูลให้ครบ','err');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  const item={icon:typeIco(currentType),name,cat,date,amt:currentType==='income'?Math.abs(amt):-Math.abs(amt),type:currentType};
  try{
    await postTx(item);
    toast('บันทึกสำเร็จ ✓');
    closeModal();
    await refreshAll();
  }catch(e){toast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง','err');}
  btn.disabled=false;btn.textContent='บันทึก';
}

async function refreshAll(){
  const rb=document.getElementById('refresh-btn');
  rb.textContent='↻ กำลังโหลด...';
  await fetchTx();
  computeStats();renderTx();renderCats();renderInv();buildChart(chartPeriod);
  rb.textContent='↻ รีเฟรช';
}

function switchChart(p,el){
  chartPeriod=p;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  buildChart(p);
}

function setPage(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const t={dashboard:'ภาพรวมการเงิน',expense:'รายรับ-รายจ่าย',invest:'การลงทุน',tax:'คำนวณภาษี'};
  document.getElementById('page-title').textContent=t[page]||'';
}

refreshAll();
</script>
